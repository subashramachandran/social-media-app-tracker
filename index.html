<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post tracker</title>
    <link rel="stylesheet" href="style.css">
 
</head>
<body>
    <div class="content">
        <h1>Social Media Post Tracker</h1>
        <p id="quote">loading qoute...</p>

<input placeholder="Post Title" id="title">
<select id="media">
    <option>Instagram</option>
    <option>Youtube</option>
    <option>Linkedin</option>
    <option>Twitter</option>
</select>
<input type="date" id="day">
<button id="btn1" onclick="add(event)">Add</button>


<select name="" id="platform">
        <option value="All">All Platform</option>
        <option value="Instagram">Instagram</option>
        <option value="Youtube">Youtube</option>
        <option value="Linkedin">Linkedin</option>
        <option value="Twitter">Twitter</option>
    </select>

    <button id="btn2">Clear All</button>
    <table id="result"></table>
    </p>
    </div>
    

        
  

   

<script src="script.js"></script>
</body>
</html>
